name: 发布 Release

on:
  push:
    tags:
      - "v*.*.*"
      - "*.*.*"

permissions:
  contents: write

jobs:
  publish-tauri:
    name: 构建并发布 ${{ matrix.platform }}
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            rustTargets: "aarch64-apple-darwin,x86_64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            rustTargets: "aarch64-apple-darwin,x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
            rustTargets: ""
          - platform: windows-latest
            args: ""
            rustTargets: ""

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 校验 tag 来源
        shell: bash
        run: |
          git fetch origin master --force

          if ! git merge-base --is-ancestor "$GITHUB_SHA" "origin/master"; then
            echo "tag ${GITHUB_REF_NAME} 指向的提交不在 origin/master 上，停止发布。"
            exit 1
          fi

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: npm

      - name: 校验 tag 版本
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          APP_VERSION="$(node -e "console.log(require('./src-tauri/tauri.conf.json').version)")"

          if [ "$TAG_VERSION" != "$APP_VERSION" ]; then
            echo "tag 版本 ${TAG_VERSION} 与 src-tauri/tauri.conf.json 版本 ${APP_VERSION} 不一致，停止发布。"
            exit 1
          fi

      - name: 校验更新签名密钥
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "缺少 GitHub Secret：TAURI_SIGNING_PRIVATE_KEY。"
            echo "请先把 Tauri updater 私钥内容配置到仓库 Secrets，再重新推送 tag。"
            exit 1
          fi

      - name: 安装 Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rustTargets }}

      - name: 安装 Linux 系统依赖
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf rpm

      - name: 安装前端依赖
        run: npm ci

      - name: 配置 macOS 签名身份
        if: matrix.platform == 'macos-latest'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "未配置 APPLE_CERTIFICATE，macOS 将使用 ad-hoc 签名。"
            echo "APPLE_SIGNING_IDENTITY=-" >> "$GITHUB_ENV"
            exit 0
          fi

          if [ -z "$APPLE_CERTIFICATE_PASSWORD" ]; then
            echo "已配置 APPLE_CERTIFICATE，但缺少 APPLE_CERTIFICATE_PASSWORD。"
            exit 1
          fi

          KEYCHAIN_PASSWORD="${KEYCHAIN_PASSWORD:-devdock-build-keychain}"

          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

          CERT_INFO="$(security find-identity -v -p codesigning build.keychain | grep 'Developer ID Application' | head -n 1 || true)"
          if [ -z "$CERT_INFO" ]; then
            echo "未找到 Developer ID Application 签名身份。"
            security find-identity -v -p codesigning build.keychain
            exit 1
          fi

          CERT_ID="$(echo "$CERT_INFO" | awk -F'"' '{print $2}')"
          echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> "$GITHUB_ENV"
          echo "已配置 macOS 签名身份：$CERT_ID"

      - name: 构建并上传 Release 产物
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: DevDock ${{ github.ref_name }}
          releaseBody: "DevDock ${{ github.ref_name }} 发布产物。"
          releaseDraft: false
          prerelease: false
          generateReleaseNotes: true
          includeUpdaterJson: true
          assetNamePattern: "[name]_[version]_[platform]_[arch][setup][ext]"
          args: ${{ matrix.args }}
