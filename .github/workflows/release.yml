name: 发布 Release

on:
  push:
    tags:
      - "v*.*.*"
      - "*.*.*"

permissions:
  contents: write

jobs:
  publish-tauri:
    name: 构建并发布 ${{ matrix.platform }}
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            rustTargets: "aarch64-apple-darwin,x86_64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            rustTargets: "aarch64-apple-darwin,x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
            rustTargets: ""
          - platform: windows-latest
            args: ""
            rustTargets: ""

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 校验 tag 来源
        shell: bash
        run: |
          git fetch origin master --force

          if ! git merge-base --is-ancestor "$GITHUB_SHA" "origin/master"; then
            echo "tag ${GITHUB_REF_NAME} 指向的提交不在 origin/master 上，停止发布。"
            exit 1
          fi

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: npm

      - name: 校验 tag 版本
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          APP_VERSION="$(node -e "console.log(require('./src-tauri/tauri.conf.json').version)")"

          if [ "$TAG_VERSION" != "$APP_VERSION" ]; then
            echo "tag 版本 ${TAG_VERSION} 与 src-tauri/tauri.conf.json 版本 ${APP_VERSION} 不一致，停止发布。"
            exit 1
          fi

      - name: 校验更新签名密钥
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "缺少 GitHub Secret：TAURI_SIGNING_PRIVATE_KEY。"
            echo "请先把 Tauri updater 私钥内容配置到仓库 Secrets，再重新推送 tag。"
            exit 1
          fi

      - name: 安装 Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rustTargets }}

      - name: 安装 Linux 系统依赖
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf rpm

      - name: 安装前端依赖
        run: npm ci

      - name: 配置 macOS 签名身份
        if: matrix.platform == 'macos-latest'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "未配置 APPLE_CERTIFICATE，macOS 将使用 ad-hoc 签名。"
            echo "APPLE_SIGNING_IDENTITY=-" >> "$GITHUB_ENV"
            exit 0
          fi

          if [ -z "$APPLE_CERTIFICATE_PASSWORD" ]; then
            echo "已配置 APPLE_CERTIFICATE，但缺少 APPLE_CERTIFICATE_PASSWORD。"
            exit 1
          fi

          KEYCHAIN_PASSWORD="${KEYCHAIN_PASSWORD:-devdock-build-keychain}"

          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

          CERT_INFO="$(security find-identity -v -p codesigning build.keychain | grep 'Developer ID Application' | head -n 1 || true)"
          if [ -z "$CERT_INFO" ]; then
            echo "未找到 Developer ID Application 签名身份。"
            security find-identity -v -p codesigning build.keychain
            exit 1
          fi

          CERT_ID="$(echo "$CERT_INFO" | awk -F'"' '{print $2}')"
          echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> "$GITHUB_ENV"
          echo "已配置 macOS 签名身份：$CERT_ID"

          if [ -n "$APPLE_ID" ] && [ -n "$APPLE_PASSWORD" ] && [ -n "$APPLE_TEAM_ID" ]; then
            echo "APPLE_ID=$APPLE_ID" >> "$GITHUB_ENV"
            echo "APPLE_PASSWORD=$APPLE_PASSWORD" >> "$GITHUB_ENV"
            echo "APPLE_TEAM_ID=$APPLE_TEAM_ID" >> "$GITHUB_ENV"
            echo "已配置 macOS notarization 账号。"
          else
            echo "未完整配置 APPLE_ID、APPLE_PASSWORD、APPLE_TEAM_ID，跳过 macOS notarization。"
          fi

      - name: 构建并上传 Release 产物
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: DevDock ${{ github.ref_name }}
          releaseBody: "DevDock ${{ github.ref_name }} 发布产物。"
          releaseDraft: false
          prerelease: false
          generateReleaseNotes: true
          includeUpdaterJson: false
          assetNamePattern: "[name]_[version]_[platform]_[arch][setup][ext]"
          args: ${{ matrix.args }}

  publish-updater-json:
    name: 发布完整 latest.json
    runs-on: ubuntu-22.04
    needs: publish-tauri
    timeout-minutes: 10
    steps:
      - name: 生成并上传 latest.json
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          VERSION="${TAG_NAME#v}"
          BASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG_NAME}"
          export VERSION BASE_URL

          gh release download "$TAG_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "*.sig" \
            --dir updater-signatures

          node <<'NODE'
          const fs = require("node:fs");
          const path = require("node:path");

          const version = process.env.VERSION;
          const baseUrl = process.env.BASE_URL;
          const release = {
            version,
            notes: `DevDock v${version} 发布产物。`,
            pub_date: new Date().toISOString(),
            platforms: {},
          };

          function addPlatform(key, assetName, sigName) {
            const sigPath = path.join("updater-signatures", sigName);
            if (!fs.existsSync(sigPath)) {
              throw new Error(`缺少签名文件：${sigName}`);
            }

            release.platforms[key] = {
              signature: fs.readFileSync(sigPath, "utf8").trim(),
              url: `${baseUrl}/${assetName}`,
            };
          }

          addPlatform(
            "darwin-x86_64",
            `devdock_${version}_darwin_x64.app.tar.gz`,
            `devdock_${version}_darwin_x64.app.tar.gz.sig`,
          );
          addPlatform(
            "darwin-x86_64-app",
            `devdock_${version}_darwin_x64.app.tar.gz`,
            `devdock_${version}_darwin_x64.app.tar.gz.sig`,
          );
          addPlatform(
            "darwin-aarch64",
            `devdock_${version}_darwin_aarch64.app.tar.gz`,
            `devdock_${version}_darwin_aarch64.app.tar.gz.sig`,
          );
          addPlatform(
            "darwin-aarch64-app",
            `devdock_${version}_darwin_aarch64.app.tar.gz`,
            `devdock_${version}_darwin_aarch64.app.tar.gz.sig`,
          );
          addPlatform(
            "windows-x86_64",
            `devdock_${version}_windows_x64.msi`,
            `devdock_${version}_windows_x64.msi.sig`,
          );
          addPlatform(
            "windows-x86_64-msi",
            `devdock_${version}_windows_x64.msi`,
            `devdock_${version}_windows_x64.msi.sig`,
          );
          addPlatform(
            "windows-x86_64-nsis",
            `devdock_${version}_windows_x64-setup.exe`,
            `devdock_${version}_windows_x64-setup.exe.sig`,
          );
          addPlatform(
            "linux-x86_64",
            `devdock_${version}_linux_amd64.AppImage`,
            `devdock_${version}_linux_amd64.AppImage.sig`,
          );
          addPlatform(
            "linux-x86_64-appimage",
            `devdock_${version}_linux_amd64.AppImage`,
            `devdock_${version}_linux_amd64.AppImage.sig`,
          );
          addPlatform(
            "linux-x86_64-deb",
            `devdock_${version}_linux_amd64.deb`,
            `devdock_${version}_linux_amd64.deb.sig`,
          );
          addPlatform(
            "linux-x86_64-rpm",
            `devdock_${version}_linux_x86_64.rpm`,
            `devdock_${version}_linux_x86_64.rpm.sig`,
          );

          fs.writeFileSync("latest.json", `${JSON.stringify(release, null, 2)}\n`);
          NODE

          gh release upload "$TAG_NAME" latest.json \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
